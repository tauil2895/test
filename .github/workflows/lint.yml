name: Linting

on: [push, pull_request]

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run Lint
        run: pip install -r requirements/dev.txt
      - name: Run Lint
        run: flake8 app/ # Solo revisa nuestra carpeta de código